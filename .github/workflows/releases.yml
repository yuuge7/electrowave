name: Publish Production Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  # --- LINUX PRODUCTION BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev alien rpm

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter packages
        run: flutter pub get

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Package as Debian Installer (.deb)
        run: |
          mkdir -p deb_pkg/opt/electrowave
          mkdir -p deb_pkg/usr/share/applications
          mkdir -p deb_pkg/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb_pkg/usr/bin
          mkdir -p deb_pkg/DEBIAN
          
          cp -r build/linux/x64/release/bundle/* deb_pkg/opt/electrowave/
          mv deb_pkg/opt/electrowave/local_player deb_pkg/opt/electrowave/electrowave
          cp web/music.png deb_pkg/usr/share/icons/hicolor/512x512/apps/electrowave.png
          
          ln -s /opt/electrowave/electrowave deb_pkg/usr/bin/electrowave
          
          cat <<EOF > deb_pkg/usr/share/applications/electrowave.desktop
          [Desktop Entry]
          Version=1.0
          Name=Electrowave
          GenericName=Media Player
          Comment=Play local music files
          Exec=/opt/electrowave/electrowave
          Icon=electrowave
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;Player;
          EOF
          
          cat <<EOF > deb_pkg/DEBIAN/control
          Package: electrowave
          Version: 1.0.0
          Architecture: amd64
          Maintainer: yuuge7
          Description: A beautiful local media player.
          EOF
          
          chmod -R 755 deb_pkg/
          dpkg-deb --build deb_pkg electrowave-linux-installer.deb

      - name: Package as Red Hat/Fedora Installer (.rpm)
        run: |
          sudo alien --to-rpm --nodeps electrowave-linux-installer.deb
          mv electrowave-*.rpm electrowave-linux-installer.rpm

      - name: Upload Linux Artifacts (Temporary)
        uses: actions/upload-artifact@v4
        with:
          name: electrowave-linux-release-files
          path: |
            electrowave-linux-installer.deb
            electrowave-linux-installer.rpm

  # --- WINDOWS PRODUCTION BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter packages
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Zip Windows Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath electrowave-windows-x64.zip

      - name: Upload Windows Artifact (Temporary)
        uses: actions/upload-artifact@v4
        with:
          name: electrowave-windows-release-files
          path: electrowave-windows-x64.zip

  # --- CREATE OFFICIAL GITHUB RELEASE ---
  publish-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Installers
        uses: actions/download-artifact@v4
        with:
          name: electrowave-linux-release-files
          path: final_assets

      - name: Download Windows Zip
        uses: actions/download-artifact@v4
        with:
          name: electrowave-windows-release-files
          path: final_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Electrowave Update v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: final_assets/*