name: Test Desktop Builds

on:
  push:
    branches: [ "testing" ]
  workflow_dispatch:

jobs:
  # --- LINUX TEST BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      # 1. Setup the cache for APT packages
      - name: Cache APT Packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-cache

      # 2. Configure APT to keep downloads, then install dependencies
      - name: Install Linux Dependencies
        run: |
          # Prevent Ubuntu from auto-deleting downloaded packages
          sudo rm -f /etc/apt/apt.conf.d/docker-clean
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' | sudo tee /etc/apt/apt.conf.d/keep-cache
          
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev libayatana-appindicator3-dev alien rpm

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter packages
        run: flutter pub get

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Package as Debian Installer (.deb)
        run: |
          mkdir -p deb_pkg/opt/electrowave
          mkdir -p deb_pkg/usr/share/applications
          mkdir -p deb_pkg/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb_pkg/usr/bin
          mkdir -p deb_pkg/DEBIAN
          
          cp -r build/linux/x64/release/bundle/* deb_pkg/opt/electrowave/
          cp web/music.png deb_pkg/usr/share/icons/hicolor/512x512/apps/electrowave.png
          
          ln -s /opt/electrowave/electrowave deb_pkg/usr/bin/electrowave
          
          cat <<EOF > deb_pkg/usr/share/applications/electrowave.desktop
          [Desktop Entry]
          Version=1.0
          Name=Electrowave
          GenericName=Media Player
          Comment=Play local music files
          Exec=/opt/electrowave/electrowave
          Icon=electrowave
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;Player;
          EOF
          
          cat <<EOF > deb_pkg/DEBIAN/control
          Package: electrowave
          Version: 1.0.0
          Architecture: amd64
          Maintainer: yuuge7
          Description: A beautiful local media player.
          EOF
          
          chmod -R 755 deb_pkg/
          dpkg-deb --build deb_pkg electrowave-linux-installer.deb

      - name: Package as Red Hat/Fedora Installer (.rpm)
        run: |
          sudo alien --to-rpm --keep-version electrowave-linux-installer.deb
          mv electrowave-*.rpm electrowave-linux-installer.rpm

      - name: Package for Arch Linux / CachyOS (.pkg.tar.zst)
        run: |
          # 1. Compress the already-compiled Linux files into a tarball
          cd deb_pkg
          tar -czvf ../electrowave-linux-build.tar.gz opt usr
          cd ..
          
          # 2. Setup the Arch build directory
          mkdir arch_build
          mv electrowave-linux-build.tar.gz arch_build/
          
          # 3. Create the Arch PKGBUILD file
          cat <<EOF > arch_build/PKGBUILD
          pkgname=electrowave
          pkgver=1.0.0
          pkgrel=1
          pkgdesc="A beautiful local media player."
          arch=('x86_64')
          license=('custom')
          options=('!debug' '!strip')
          depends=('gtk3' 'mpv' 'libayatana-appindicator')
          source=("electrowave-linux-build.tar.gz")
          sha256sums=('SKIP')
          
          package() {
              # makepkg automatically extracts the tarball into \$srcdir
              cp -r "\$srcdir/opt" "\$pkgdir/"
              cp -r "\$srcdir/usr" "\$pkgdir/"
          }
          EOF
          
          # 4. Use a temporary Arch Linux Docker container to build the package
          docker run --rm -v ${{ github.workspace }}/arch_build:/build archlinux /bin/bash -c "
            pacman -Sy --noconfirm base-devel
            useradd -m builder
            chown -R builder:builder /build
            cd /build
            # Run makepkg with -d (nodeps) so it doesn't fail checking for mpv inside the minimal container
            su builder -c 'makepkg -cfd'
          "
          
          # 5. Move the finished package out for upload with the new, shorter name
          sudo mv arch_build/*.pkg.tar.zst ./electrowave.pkg.tar.zst
          sudo chown "$(id -u):$(id -g)" ./electrowave.pkg.tar.zst

      - name: Upload Linux Artifacts (Internal Testing)
        uses: actions/upload-artifact@v4
        with:
          name: electrowave-linux-testing
          path: |
            electrowave-linux-installer.deb
            electrowave-linux-installer.rpm
            electrowave.pkg.tar.zst

  # --- WINDOWS TEST BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter packages
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: electrowave-windows-testing
          path: build\windows\x64\runner\Release\